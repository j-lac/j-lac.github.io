<nav class="site-nav-wrap" aria-label="メインナビゲーション">
  <ul class="site-nav">
    {% for item in site.data.nav %}
      {% if item.children %}
        <li class="site-nav__item has-dropdown" data-slug="{{ item.slug }}">
          <a class="site-nav__link" href="{{ item.href | relative_url }}" data-nav="{{ item.slug }}">{{ item.label }}</a>
          <button class="dropdown-toggle" type="button" aria-expanded="false" aria-label="{{ item.label }} のサブメニューを開く">▾</button>
          <ul class="dropdown" hidden>
            {% for child in item.children %}
              <li><a class="dropdown__link" href="{{ child.href | relative_url }}">{{ child.label }}</a></li>
            {% endfor %}
          </ul>
        </li>
      {% else %}
        <li class="site-nav__item">
          <a class="site-nav__link" href="{{ item.href | relative_url }}" data-nav="{{ item.slug }}">{{ item.label }}</a>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</nav>
